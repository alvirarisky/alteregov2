version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local Storage
  shared_preferences: ^2.3.2

  # Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.0
